<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Geo Audio Guide — Адмін</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Geologica:wght@300;400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  :root {
    --bg: #0a0f1a;
    --surface: #111827;
    --surface2: #1a2332;
    --border: #1f2d3d;
    --accent: #00d4ff;
    --accent2: #00ff88;
    --danger: #ff4757;
    --warning: #ffa502;
    --text: #e8f0fe;
    --text2: #7a8fa6;
    --text3: #4a5f75;
    --radius: 12px;
    --shadow: 0 4px 24px rgba(0,0,0,0.4);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Geologica', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Background grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,212,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,212,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  /* HEADER */
  header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(10,15,26,0.92);
    backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--border);
    padding: 0 20px;
    height: 60px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    text-decoration: none;
  }

  .logo-icon {
    width: 36px;
    height: 36px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
  }

  .logo-text {
    font-size: 15px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: -0.3px;
    line-height: 1.1;
  }

  .logo-sub {
    font-size: 10px;
    color: var(--text2);
    font-weight: 300;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  /* Language switcher */
  .lang-switcher {
    display: flex;
    gap: 4px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 3px;
  }

  .lang-btn {
    background: none;
    border: none;
    color: var(--text2);
    font-family: 'Geologica', sans-serif;
    font-size: 12px;
    font-weight: 500;
    padding: 4px 10px;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.5px;
  }

  .lang-btn:hover { color: var(--text); background: var(--surface2); }
  .lang-btn.active { background: var(--accent); color: #000; font-weight: 700; }

  /* STATUS BAR */
  .status-bar {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: var(--text2);
    white-space: nowrap;
  }

  .status-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--accent2);
    box-shadow: 0 0 6px var(--accent2);
    animation: pulse 2s infinite;
  }

  .status-dot.offline { background: var(--danger); box-shadow: 0 0 6px var(--danger); animation: none; }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  /* LAYOUT */
  .layout {
    position: relative;
    z-index: 1;
    display: grid;
    grid-template-columns: 360px 1fr;
    height: calc(100vh - 60px);
  }

  /* SIDEBAR */
  .sidebar {
    display: flex;
    flex-direction: column;
    border-right: 1px solid var(--border);
    overflow: hidden;
  }

  /* FORM */
  .form-section {
    padding: 16px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .section-title {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--text3);
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  .form-group {
    display: flex;
    flex-direction: column;
    gap: 5px;
  }

  .form-group.full { grid-column: 1 / -1; }

  label {
    font-size: 11px;
    font-weight: 500;
    color: var(--text2);
    letter-spacing: 0.3px;
  }

  input {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 9px 12px;
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    transition: all 0.2s;
    width: 100%;
    -webkit-appearance: none;
  }

  input:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(0,212,255,0.1);
  }

  input::placeholder { color: var(--text3); }

  .btn-row {
    display: flex;
    gap: 8px;
    margin-top: 12px;
  }

  .btn {
    flex: 1;
    padding: 10px;
    border: none;
    border-radius: 8px;
    font-family: 'Geologica', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.2px;
  }

  .btn-primary {
    background: linear-gradient(135deg, var(--accent), #0099cc);
    color: #000;
  }

  .btn-primary:hover {
    transform: translateY(-1px);
    box-shadow: 0 4px 16px rgba(0,212,255,0.3);
  }

  .btn-primary:active { transform: translateY(0); }

  .btn-ghost {
    background: var(--surface2);
    color: var(--text2);
    border: 1px solid var(--border);
    flex: 0 0 auto;
    padding: 10px 16px;
  }

  .btn-ghost:hover { color: var(--text); border-color: var(--text3); }

  /* ZONES LIST */
  .zones-section {
    flex: 1;
    overflow-y: auto;
    padding: 12px 16px;
  }

  .zones-section::-webkit-scrollbar { width: 4px; }
  .zones-section::-webkit-scrollbar-track { background: transparent; }
  .zones-section::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .zones-count {
    font-size: 11px;
    color: var(--text3);
    margin-bottom: 10px;
  }

  .zone-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 14px;
    margin-bottom: 8px;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }

  .zone-card::before {
    content: '';
    position: absolute;
    left: 0;
    top: 0;
    bottom: 0;
    width: 3px;
    background: var(--accent);
    opacity: 0;
    transition: opacity 0.2s;
  }

  .zone-card:hover { border-color: var(--text3); transform: translateX(2px); }
  .zone-card.active { border-color: var(--accent); background: rgba(0,212,255,0.05); }
  .zone-card.active::before { opacity: 1; }

  .zone-name {
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
    margin-bottom: 5px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .zone-meta {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text3);
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin-bottom: 6px;
  }

  .zone-meta span { display: flex; align-items: center; gap: 3px; }

  .zone-audio {
    font-size: 11px;
    color: var(--text3);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .zone-actions {
    display: flex;
    gap: 6px;
    margin-top: 8px;
  }

  .btn-sm {
    padding: 5px 12px;
    border: none;
    border-radius: 6px;
    font-family: 'Geologica', sans-serif;
    font-size: 11px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.3px;
  }

  .btn-edit {
    background: rgba(0,212,255,0.1);
    color: var(--accent);
    border: 1px solid rgba(0,212,255,0.2);
  }

  .btn-edit:hover { background: rgba(0,212,255,0.2); }

  .btn-delete {
    background: rgba(255,71,87,0.1);
    color: var(--danger);
    border: 1px solid rgba(255,71,87,0.2);
  }

  .btn-delete:hover { background: rgba(255,71,87,0.2); }

  /* EMPTY STATE */
  .empty-state {
    text-align: center;
    padding: 40px 20px;
    color: var(--text3);
  }

  .empty-state .empty-icon { font-size: 40px; margin-bottom: 12px; }
  .empty-state p { font-size: 13px; line-height: 1.6; }

  /* MAP */
  .map-container {
    position: relative;
  }

  #map {
    height: 100%;
    width: 100%;
    background: var(--surface);
  }

  /* TOAST */
  .toast-container {
    position: fixed;
    bottom: 20px;
    right: 20px;
    z-index: 9999;
    display: flex;
    flex-direction: column;
    gap: 8px;
    pointer-events: none;
  }

  .toast {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 16px;
    font-size: 13px;
    color: var(--text);
    box-shadow: var(--shadow);
    display: flex;
    align-items: center;
    gap: 10px;
    animation: slideIn 0.3s ease;
    min-width: 240px;
    max-width: 320px;
  }

  .toast.success { border-color: rgba(0,255,136,0.3); }
  .toast.error { border-color: rgba(255,71,87,0.3); }

  .toast-icon { font-size: 16px; flex-shrink: 0; }

  @keyframes slideIn {
    from { transform: translateX(100%); opacity: 0; }
    to { transform: translateX(0); opacity: 1; }
  }

  @keyframes slideOut {
    from { transform: translateX(0); opacity: 1; }
    to { transform: translateX(100%); opacity: 0; }
  }

  /* LOADING */
  .loading-overlay {
    position: absolute;
    inset: 0;
    background: rgba(10,15,26,0.7);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 50;
    backdrop-filter: blur(4px);
  }

  .spinner {
    width: 32px;
    height: 32px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* CONFIRM DIALOG */
  .dialog-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 200;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 20px;
    backdrop-filter: blur(4px);
  }

  .dialog-overlay.show { display: flex; }

  .dialog {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px;
    max-width: 340px;
    width: 100%;
    box-shadow: var(--shadow);
  }

  .dialog h3 { font-size: 16px; margin-bottom: 8px; }
  .dialog p { font-size: 13px; color: var(--text2); margin-bottom: 20px; line-height: 1.5; }

  .dialog-actions { display: flex; gap: 8px; }

  /* MOBILE */
  @media (max-width: 768px) {
    .layout {
      grid-template-columns: 1fr;
      grid-template-rows: auto 1fr;
      height: auto;
      min-height: calc(100vh - 60px);
    }

    .sidebar {
      border-right: none;
      border-bottom: 1px solid var(--border);
      max-height: none;
    }

    .map-container {
      height: 50vh;
      min-height: 300px;
    }

    .logo-sub { display: none; }

    .form-grid {
      grid-template-columns: 1fr 1fr;
    }
  }

  @media (max-width: 480px) {
    header { padding: 0 14px; }
    .form-section { padding: 14px; }
    .zones-section { padding: 10px 14px; }

    .lang-btn { padding: 4px 7px; font-size: 11px; }

    .form-grid {
      grid-template-columns: 1fr;
    }

    .form-group.full { grid-column: 1; }
  }

  /* Leaflet dark overrides */
  .leaflet-tile { filter: brightness(0.85) saturate(0.8); }
  .leaflet-popup-content-wrapper {
    background: var(--surface2) !important;
    border: 1px solid var(--border) !important;
    border-radius: 10px !important;
    box-shadow: var(--shadow) !important;
    color: var(--text) !important;
  }
  .leaflet-popup-tip { background: var(--surface2) !important; }
  .leaflet-popup-content { margin: 12px 14px !important; }
  .leaflet-control-zoom a {
    background: var(--surface2) !important;
    color: var(--text) !important;
    border-color: var(--border) !important;
  }
  .leaflet-control-zoom a:hover { background: var(--surface) !important; }
  .leaflet-attribution-flag { display: none !important; }
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="logo">
    <div class="logo-icon">🎧</div>
    <div>
      <div class="logo-text">Geo Audio Guide</div>
      <div class="logo-sub" data-i18n="adminPanel">Адмін панель</div>
    </div>
  </div>

  <div style="display:flex;align-items:center;gap:12px;flex-shrink:0;">
    <div class="status-bar">
      <div class="status-dot" id="statusDot"></div>
      <span id="statusText">—</span>
    </div>
    <div class="lang-switcher">
      <button class="lang-btn active" onclick="setLang('uk')">УКР</button>
      <button class="lang-btn" onclick="setLang('ru')">РУС</button>
      <button class="lang-btn" onclick="setLang('en')">ENG</button>
    </div>
  </div>
</header>

<!-- LAYOUT -->
<div class="layout">

  <!-- SIDEBAR -->
  <div class="sidebar">

    <!-- FORM -->
    <div class="form-section">
      <div class="section-title" id="formTitle" data-i18n="newZone">Нова зона</div>
      <div class="form-grid">
        <div class="form-group full">
          <label data-i18n="labelName">Назва</label>
          <input type="text" id="fieldName" data-i18n-placeholder="placeholderName" placeholder="Центральний парк">
        </div>
        <div class="form-group">
          <label data-i18n="labelLat">Широта</label>
          <input type="number" id="fieldLat" step="any" placeholder="50.4501">
        </div>
        <div class="form-group">
          <label data-i18n="labelLng">Довгота</label>
          <input type="number" id="fieldLng" step="any" placeholder="30.5234">
        </div>
        <div class="form-group full">
          <label data-i18n="labelRadius">Радіус (метри)</label>
          <input type="number" id="fieldRadius" placeholder="100" value="100">
        </div>
        <div class="form-group full">
          <label data-i18n="labelAudio">Audio URL</label>
          <input type="text" id="fieldAudio" placeholder="https://...mp3">
        </div>
      </div>
      <div class="btn-row">
        <button class="btn btn-primary" id="btnSubmit" onclick="submitZone()">
          <span data-i18n="btnCreate">Створити зону</span>
        </button>
        <button class="btn btn-ghost" id="btnCancel" onclick="cancelEdit()" style="display:none" data-i18n="btnCancel">Скасувати</button>
      </div>
    </div>

    <!-- ZONES LIST -->
    <div class="zones-section">
      <div class="zones-count" id="zonesCount"></div>
      <div id="zonesList"></div>
    </div>
  </div>

  <!-- MAP -->
  <div class="map-container">
    <div id="map"></div>
  </div>
</div>

<!-- TOAST -->
<div class="toast-container" id="toastContainer"></div>

<!-- CONFIRM DIALOG -->
<div class="dialog-overlay" id="confirmDialog">
  <div class="dialog">
    <h3 data-i18n="confirmTitle">Видалити зону?</h3>
    <p data-i18n="confirmText">Цю дію неможливо скасувати.</p>
    <div class="dialog-actions">
      <button class="btn btn-ghost" style="flex:1" onclick="closeConfirm()" data-i18n="btnCancel">Скасувати</button>
      <button class="btn" style="flex:1;background:var(--danger);color:#fff;" onclick="confirmDelete()" data-i18n="btnDelete">Видалити</button>
    </div>
  </div>
</div>

<script>
// ============================================================
// CONFIG
// ============================================================
const API = {
  getAll:  'https://primary-production-4b93e.up.railway.app/webhook/zones',
  post:    'https://primary-production-4b93e.up.railway.app/webhook/zones',
  update:  'https://primary-production-4b93e.up.railway.app/webhook/zones-update',
  delete:  'https://primary-production-4b93e.up.railway.app/webhook/zones-delete',
};

// ============================================================
// I18N
// ============================================================
const LANGS = {
  uk: {
    adminPanel:      'Адмін панель',
    newZone:         'Нова зона',
    editZone:        'Редагувати зону',
    labelName:       'Назва',

    zonesCount:      (n) => `${n} зон${n===1?'а':n<5?'и':''}`,
    toastCreated:    'Зону створено',
    toastUpdated:    'Зону оновлено',
    toastDeleted:    'Зону видалено',

    toastFill:       'Заповніть всі поля',
    statusOnline:    'онлайн',
    statusOffline:   'офлайн',

  },

    placeholderName: 'Центральный парк',
    btnCreate:       'Создать зону',
    btnUpdate:       'Сохранить',
    btnCancel:       'Отмена',
    btnEdit:         'Редактировать',
    btnDelete:       'Удалить',
    confirmTitle:    'Удалить зону?',
    confirmText:     'Это действие невозможно отменить.',
    zonesCount:      (n) => `${n} зон${n===1?'а':n<5?'ы':''}`,
    toastCreated:    'Зона создана',
    toastUpdated:    'Зона обновлена',
    toastDeleted:    'Зона удалена',
    toastError:      'Ошибка соединения',
    toastFill:       'Заполните все поля',
    statusOnline:    'онлайн',
    statusOffline:   'офлайн',
    emptyTitle:      'Зон пока нет',
    emptyText:       'Создайте первую зону через форму выше',
    popupRadius:     'Радиус',
    popupAudio:      'Аудио',
  },
  en: {
    adminPanel:      'Admin Panel',
    newZone:         'New Zone',
    editZone:        'Edit Zone',
    labelName:       'Name',
    labelLat:        'Latitude',
    labelLng:        'Longitude',
    labelRadius:     'Radius (meters)',
    labelAudio:      'Audio URL',
    placeholderName: 'Central Park',
    btnCreate:       'Create Zone',
    btnUpdate:       'Save',
    btnCancel:       'Cancel',
    btnEdit:         'Edit',
    btnDelete:       'Delete',
    confirmTitle:    'Delete zone?',
    confirmText:     'This action cannot be undone.',
    zonesCount:      (n) => `${n} zone${n===1?'':'s'}`,
    toastCreated:    'Zone created',
    toastUpdated:    'Zone updated',
    toastDeleted:    'Zone deleted',
    toastError:      'Connection error',
    toastFill:       'Please fill all fields',
    statusOnline:    'online',
    statusOffline:   'offline',
    emptyTitle:      'No zones yet',
    emptyText:       'Create your first zone using the form above',
    popupRadius:     'Radius',
    popupAudio:      'Audio',
  }
};

let lang = 'uk';

function t(key) {
  return LANGS[lang][key] || key;
}

function setLang(l) {
  lang = l;
  document.querySelectorAll('.lang-btn').forEach(b => {
    b.classList.toggle('active', b.textContent.trim().toLowerCase().startsWith(l === 'uk' ? 'у' : l === 'ru' ? 'р' : 'e'));
  });
  applyI18n();
  renderZones();
  updateStatus(lastOnline);
}

function applyI18n() {
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.dataset.i18n;
    if (typeof LANGS[lang][key] === 'string') el.textContent = LANGS[lang][key];
  });
  document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
    const key = el.dataset.i18nPlaceholder;
    if (LANGS[lang][key]) el.placeholder = LANGS[lang][key];
  });
  // update dynamic elements
  if (editingId) {
    document.getElementById('formTitle').textContent = t('editZone');
    document.querySelector('#btnSubmit [data-i18n]').textContent = t('btnUpdate');
  } else {
    document.getElementById('formTitle').textContent = t('newZone');
    document.querySelector('#btnSubmit [data-i18n]').textContent = t('btnCreate');
  }
}

// ============================================================
// STATE
// ============================================================
let zones = [];
let editingId = null;
let deleteId = null;
let lastOnline = false;
let map, markersLayer;

// ============================================================
// MAP INIT
// ============================================================
function initMap() {
  map = L.map('map', { zoomControl: true }).setView([50.45, 30.52], 11);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap',
    maxZoom: 19,
  }).addTo(map);
  markersLayer = L.layerGroup().addTo(map);
}

function updateMap() {
  markersLayer.clearLayers();
  if (!zones.length) return;

  const bounds = [];

  zones.forEach(zone => {
    const circle = L.circle([zone.latitude, zone.longitude], {
      radius: zone.radius,
      color: '#00d4ff',
      fillColor: '#00d4ff',
      fillOpacity: 0.12,
      weight: 1.5,
    });

    const marker = L.circleMarker([zone.latitude, zone.longitude], {
      radius: 7,
      color: '#00d4ff',
      fillColor: '#00d4ff',
      fillOpacity: 0.9,
      weight: 2,
    });

    const popup = L.popup({ closeButton: false }).setContent(`
      <div style="font-family:'Geologica',sans-serif;">
        <div style="font-weight:600;font-size:14px;margin-bottom:6px;color:#e8f0fe">${zone.name}</div>
        <div style="font-size:12px;color:#7a8fa6;margin-bottom:3px">📍 ${zone.latitude.toFixed(5)}, ${zone.longitude.toFixed(5)}</div>
        <div style="font-size:12px;color:#7a8fa6;margin-bottom:3px">⭕ ${t('popupRadius')}: ${zone.radius}m</div>
        <div style="font-size:11px;color:#4a5f75;word-break:break-all">🔊 ${zone.audio_url}</div>
      </div>
    `);

    marker.bindPopup(popup);
    marker.on('click', () => selectZone(zone.id));

    circle.addTo(markersLayer);
    marker.addTo(markersLayer);
    bounds.push([zone.latitude, zone.longitude]);
  });

  if (bounds.length === 1) {
    map.setView(bounds[0], 14);
  } else if (bounds.length > 1) {
    map.fitBounds(bounds, { padding: [40, 40] });
  }
}

function flyToZone(zone) {
  map.flyTo([zone.latitude, zone.longitude], 15, { duration: 1.2 });
}

// ============================================================
// API
// ============================================================
async function fetchZones() {
  try {
    const res = await fetch(API.getAll);
    if (!res.ok) throw new Error();
    const data = await res.json();
    zones = Array.isArray(data) ? data : [data];
    setStatus(true);
    renderZones();
    updateMap();
  } catch {
    setStatus(false);
  }
}

async function submitZone() {
  const name     = document.getElementById('fieldName').value.trim();
  const latitude = parseFloat(document.getElementById('fieldLat').value);
  const longitude= parseFloat(document.getElementById('fieldLng').value);
  const radius   = parseFloat(document.getElementById('fieldRadius').value) || 100;
  const audioUrl = document.getElementById('fieldAudio').value.trim();

  if (!name || isNaN(latitude) || isNaN(longitude) || !audioUrl) {
    showToast(t('toastFill'), 'error');
    return;
  }

  const btn = document.getElementById('btnSubmit');
  btn.disabled = true;

  try {
    if (editingId) {
      const res = await fetch(API.update, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ id: editingId, name, latitude, longitude, radius, audioUrl }),
      });
      if (!res.ok) throw new Error();
      const updated = await res.json();
      zones = zones.map(z => z.id === editingId ? updated : z);
      showToast(t('toastUpdated'), 'success');
      cancelEdit();
    } else {
      const res = await fetch(API.post, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, latitude, longitude, radius, audioUrl }),
      });
      if (!res.ok) throw new Error();
      const created = await res.json();
      zones = [created, ...zones];
      showToast(t('toastCreated'), 'success');
      clearForm();
    }
    renderZones();
    updateMap();
  } catch {
    showToast(t('toastError'), 'error');
  } finally {
    btn.disabled = false;
  }
}

function askDelete(id) {
  deleteId = id;
  document.getElementById('confirmDialog').classList.add('show');
}

function closeConfirm() {
  deleteId = null;
  document.getElementById('confirmDialog').classList.remove('show');
}

async function confirmDelete() {
  if (!deleteId) return;
  closeConfirm();
  try {
    const res = await fetch(API.delete, {
      method: 'DELETE',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ id: deleteId }),
    });
    if (!res.ok) throw new Error();
    zones = zones.filter(z => z.id !== deleteId);
    if (editingId === deleteId) cancelEdit();
    showToast(t('toastDeleted'), 'success');
    renderZones();
    updateMap();
  } catch {
    showToast(t('toastError'), 'error');
  }
  deleteId = null;
}

// ============================================================
// UI
// ============================================================
function renderZones() {
  const list = document.getElementById('zonesList');
  const count = document.getElementById('zonesCount');

  count.textContent = typeof t('zonesCount') === 'function'
    ? LANGS[lang].zonesCount(zones.length)
    : `${zones.length}`;

  if (!zones.length) {
    list.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">🗺️</div>
        <p><strong>${t('emptyTitle')}</strong><br>${t('emptyText')}</p>
      </div>`;
    return;
  }

  list.innerHTML = zones.map(z => `
    <div class="zone-card ${editingId === z.id ? 'active' : ''}" onclick="selectZone(${z.id})">
      <div class="zone-name">${escHtml(z.name)}</div>
      <div class="zone-meta">
        <span>📍 ${z.latitude.toFixed(4)}, ${z.longitude.toFixed(4)}</span>
        <span>⭕ ${z.radius}m</span>
      </div>
      <div class="zone-audio">🔊 ${escHtml(z.audio_url)}</div>
      <div class="zone-actions">
        <button class="btn-sm btn-edit" onclick="event.stopPropagation();editZone(${z.id})">${t('btnEdit')}</button>
        <button class="btn-sm btn-delete" onclick="event.stopPropagation();askDelete(${z.id})">${t('btnDelete')}</button>
      </div>
    </div>
  `).join('');
}

function selectZone(id) {
  const zone = zones.find(z => z.id === id);
  if (!zone) return;
  document.querySelectorAll('.zone-card').forEach(c => c.classList.remove('active'));
  const card = document.querySelector(`.zone-card[onclick*="selectZone(${id})"]`);
  if (card) card.classList.add('active');
  flyToZone(zone);
}

function editZone(id) {
  const zone = zones.find(z => z.id === id);
  if (!zone) return;
  editingId = id;
  document.getElementById('fieldName').value   = zone.name;
  document.getElementById('fieldLat').value    = zone.latitude;
  document.getElementById('fieldLng').value    = zone.longitude;
  document.getElementById('fieldRadius').value = zone.radius;
  document.getElementById('fieldAudio').value  = zone.audio_url;
  document.getElementById('formTitle').textContent = t('editZone');
  document.querySelector('#btnSubmit [data-i18n]').textContent = t('btnUpdate');
  document.getElementById('btnCancel').style.display = '';
  renderZones();
  flyToZone(zone);
  // scroll to top on mobile
  document.querySelector('.form-section').scrollIntoView({ behavior: 'smooth' });
}

function cancelEdit() {
  editingId = null;
  clearForm();
  document.getElementById('formTitle').textContent = t('newZone');
  document.querySelector('#btnSubmit [data-i18n]').textContent = t('btnCreate');
  document.getElementById('btnCancel').style.display = 'none';
  renderZones();
}

function clearForm() {
  ['fieldName','fieldLat','fieldLng','fieldAudio'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('fieldRadius').value = '100';
}

function setStatus(online) {
  lastOnline = online;
  updateStatus(online);
}

function updateStatus(online) {
  document.getElementById('statusDot').className = 'status-dot' + (online ? '' : ' offline');
  document.getElementById('statusText').textContent = online ? t('statusOnline') : t('statusOffline');
}

function showToast(msg, type = 'success') {
  const c = document.getElementById('toastContainer');
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.innerHTML = `<span class="toast-icon">${type === 'success' ? '✓' : '⚠'}</span><span>${msg}</span>`;
  c.appendChild(el);
  setTimeout(() => {
    el.style.animation = 'slideOut 0.3s ease forwards';
    setTimeout(() => el.remove(), 300);
  }, 2800);
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ============================================================
// INIT
// ============================================================
initMap();
fetchZones();
setInterval(fetchZones, 30000);
applyI18n();
</script>
</body>
</html>
