<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Whispr.city — Superadmin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,700;1,9..144,400;1,9..144,600;1,9..144,700&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>

/* ═══════════════════════════════════════
   TOKENS
═══════════════════════════════════════ */
:root {
  --bg:       #080c14;
  --bg2:      #0e1520;
  --bg3:      #1a2235;
  --bg4:      #232f45;
  --line:     rgba(255,255,255,.07);
  --line2:    rgba(255,255,255,.12);
  --text:     #e8e6e1;
  --text2:    rgba(232,230,225,.55);
  --text3:    rgba(232,230,225,.28);
  --accent:   #c8622a;
  --accent-h: #b05520;
  --amber:    #e89e22;
  --green:    #2ab87a;
  --red:      #e05050;
  --blue:     #6496dc;
  --purple:   #a064d2;
  --serif:    'Fraunces', Georgia, serif;
  --sans:     'DM Sans', system-ui, sans-serif;
  --mono:     'DM Mono', monospace;
  --sidebar:  240px;
  --topbar:   56px;
  --radius:   10px;
  --radius-sm:6px;
  --tr:       .18s ease;
  --shadow:   0 2px 8px rgba(0,0,0,.3), 0 8px 32px rgba(0,0,0,.2);
}

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }
body {
  font-family: var(--sans);
  background: var(--bg);
  color: var(--text);
  font-size: 14px;
  line-height: 1.6;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
}

/* ═══════════════════════════════════════
   TOPBAR
═══════════════════════════════════════ */
.topbar {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: var(--topbar);
  background: var(--bg);
  border-bottom: 1px solid var(--line);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 24px 0 0;
  z-index: 100;
}

.topbar-logo {
  width: var(--sidebar);
  padding: 0 20px;
  display: flex;
  align-items: center;
  border-right: 1px solid var(--line);
  height: 100%;
  flex-shrink: 0;
}

.topbar-right {
  display: flex;
  align-items: center;
  gap: 16px;
}

.topbar-user {
  display: flex;
  align-items: center;
  gap: 10px;
}
.topbar-avatar {
  width: 32px; height: 32px;
  border-radius: 50%;
  background: var(--bg3);
  border: 1.5px solid var(--line2);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--mono);
  font-size: 11px;
  color: var(--amber);
  font-weight: 500;
  flex-shrink: 0;
}
.topbar-name {
  font-size: 13px;
  font-weight: 500;
  color: var(--text);
}
.topbar-role {
  font-family: var(--mono);
  font-size: 9px;
  color: var(--accent);
  letter-spacing: 1px;
  text-transform: uppercase;
}

.lang-sw {
  display: flex;
  align-items: center;
  background: var(--bg2);
  border: 1px solid var(--line);
  border-radius: var(--radius-sm);
  padding: 3px;
  gap: 2px;
}
.lang-btn {
  background: none;
  border: none;
  padding: 3px 8px;
  font-family: var(--mono);
  font-size: 10px;
  color: var(--text3);
  cursor: pointer;
  border-radius: 4px;
  transition: all var(--tr);
  letter-spacing: .5px;
}
.lang-btn:hover { color: var(--text2); }
.lang-btn.active { background: var(--accent); color: #fff; }

.btn-logout {
  display: flex;
  align-items: center;
  gap: 6px;
  background: none;
  border: 1px solid var(--line);
  border-radius: var(--radius-sm);
  padding: 6px 12px;
  color: var(--text3);
  font-family: var(--sans);
  font-size: 12px;
  cursor: pointer;
  transition: all var(--tr);
}
.btn-logout:hover { border-color: var(--red); color: var(--red); }

/* ═══════════════════════════════════════
   SIDEBAR
═══════════════════════════════════════ */
.sidebar {
  position: fixed;
  top: var(--topbar);
  left: 0;
  width: var(--sidebar);
  height: calc(100vh - var(--topbar));
  background: var(--bg);
  border-right: 1px solid var(--line);
  overflow-y: auto;
  z-index: 90;
  padding: 16px 0;
}

.nav-section { margin-bottom: 8px; }

.nav-section-label {
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--text3);
  padding: 6px 20px;
  margin-bottom: 2px;
}

.nav-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 20px;
  cursor: pointer;
  transition: all var(--tr);
  border-left: 2px solid transparent;
  font-size: 13px;
  font-weight: 400;
  color: var(--text2);
  user-select: none;
}
.nav-item:hover {
  background: var(--bg2);
  color: var(--text);
}
.nav-item.active {
  background: rgba(200,98,42,.08);
  border-left-color: var(--accent);
  color: var(--accent);
}
.nav-item svg { flex-shrink: 0; opacity: .7; }
.nav-item.active svg { opacity: 1; }

.nav-badge {
  margin-left: auto;
  background: var(--accent);
  color: #fff;
  font-family: var(--mono);
  font-size: 9px;
  padding: 2px 6px;
  border-radius: 10px;
  min-width: 18px;
  text-align: center;
}

.sidebar-divider {
  height: 1px;
  background: var(--line);
  margin: 10px 0;
}

/* ═══════════════════════════════════════
   MAIN CONTENT
═══════════════════════════════════════ */
.main {
  margin-left: var(--sidebar);
  margin-top: var(--topbar);
  min-height: calc(100vh - var(--topbar));
}

.section { display: none; padding: 28px; }
.section.active { display: block; }

.section-head {
  margin-bottom: 24px;
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 16px;
  flex-wrap: wrap;
}
.section-title {
  font-family: var(--serif);
  font-size: 26px;
  font-weight: 700;
  color: var(--text);
  letter-spacing: -.5px;
  line-height: 1.1;
}
.section-title em { font-style: italic; color: var(--accent); }
.section-sub {
  font-size: 13px;
  color: var(--text3);
  margin-top: 4px;
  font-weight: 300;
}

/* ═══════════════════════════════════════
   CARDS / PANELS
═══════════════════════════════════════ */
.panel {
  background: var(--bg2);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  overflow: hidden;
}

.panel-head {
  padding: 14px 20px;
  border-bottom: 1px solid var(--line);
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
}
.panel-title {
  font-size: 13px;
  font-weight: 600;
  color: var(--text);
  display: flex;
  align-items: center;
  gap: 8px;
}
.panel-body { padding: 20px; }

/* ═══════════════════════════════════════
   STATS ROW
═══════════════════════════════════════ */
.stats-row {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 12px;
  margin-bottom: 24px;
}
.stat-card {
  background: var(--bg2);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  padding: 18px 20px;
  display: flex;
  align-items: center;
  gap: 14px;
  transition: border-color var(--tr);
}
.stat-card:hover { border-color: var(--line2); }
.stat-icon {
  width: 40px; height: 40px;
  border-radius: var(--radius-sm);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
.stat-icon.orange { background: rgba(200,98,42,.12); color: var(--accent); }
.stat-icon.amber  { background: rgba(232,158,34,.12); color: var(--amber); }
.stat-icon.green  { background: rgba(42,184,122,.12); color: var(--green); }
.stat-icon.blue   { background: rgba(100,150,220,.12); color: var(--blue); }
.stat-val {
  font-family: var(--serif);
  font-size: 24px;
  font-weight: 700;
  color: var(--text);
  line-height: 1;
}
.stat-label {
  font-size: 11px;
  color: var(--text3);
  margin-top: 3px;
  font-family: var(--mono);
  letter-spacing: .3px;
}

/* ═══════════════════════════════════════
   TABLE
═══════════════════════════════════════ */
.table-wrap {
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  max-width: 100%;
}
table { width: 100%; border-collapse: collapse; }
th {
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--text3);
  padding: 10px 16px;
  text-align: left;
  background: var(--bg3);
  border-bottom: 1px solid var(--line);
  white-space: nowrap;
}
td {
  padding: 12px 16px;
  font-size: 13px;
  color: var(--text2);
  border-bottom: 1px solid var(--line);
  vertical-align: middle;
}
tr:last-child td { border-bottom: none; }
tr:hover td { background: rgba(255,255,255,.02); }

.td-name { font-weight: 500; color: var(--text); }
.td-email { font-family: var(--mono); font-size: 11px; color: var(--text3); }
.td-city { font-size: 12px; color: var(--text3); font-style: italic; }

/* Status pills */
.pill {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  font-family: var(--mono);
  font-size: 9px;
  padding: 3px 8px;
  border-radius: 10px;
  letter-spacing: .5px;
  text-transform: uppercase;
  white-space: nowrap;
}
.pill::before {
  content: '';
  width: 5px; height: 5px;
  border-radius: 50%;
  background: currentColor;
  flex-shrink: 0;
}
.pill-pending  { background: rgba(232,158,34,.1);  color: var(--amber); border: 1px solid rgba(232,158,34,.2); }
.pill-active   { background: rgba(42,184,122,.1);  color: var(--green); border: 1px solid rgba(42,184,122,.2); }
.pill-rejected { background: rgba(224,80,80,.1);   color: var(--red);   border: 1px solid rgba(224,80,80,.2); }
.pill-draft    { background: rgba(232,230,225,.06); color: var(--text3); border: 1px solid var(--line); }

/* ═══════════════════════════════════════
   BUTTONS
═══════════════════════════════════════ */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 7px 14px;
  border-radius: var(--radius-sm);
  font-family: var(--sans);
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  border: none;
  transition: all var(--tr);
  white-space: nowrap;
  text-decoration: none;
}
.btn:disabled { opacity: .4; cursor: not-allowed; }

.btn-primary { background: var(--accent); color: #fff; }
.btn-primary:hover:not(:disabled) { background: var(--accent-h); }

.btn-ghost {
  background: transparent;
  color: var(--text2);
  border: 1px solid var(--line);
}
.btn-ghost:hover:not(:disabled) { border-color: var(--line2); color: var(--text); }

.btn-success { background: rgba(42,184,122,.15); color: var(--green); border: 1px solid rgba(42,184,122,.25); }
.btn-success:hover:not(:disabled) { background: rgba(42,184,122,.25); }

.btn-danger { background: rgba(224,80,80,.12); color: var(--red); border: 1px solid rgba(224,80,80,.2); }
.btn-danger:hover:not(:disabled) { background: rgba(224,80,80,.22); }

.btn-amber { background: rgba(232,158,34,.12); color: var(--amber); border: 1px solid rgba(232,158,34,.2); }
.btn-amber:hover:not(:disabled) { background: rgba(232,158,34,.22); }

.btn-sm { padding: 5px 10px; font-size: 11px; }
.btn-lg { padding: 10px 20px; font-size: 13px; }

.btn-group { display: flex; gap: 6px; }

/* ═══════════════════════════════════════
   FORM CONTROLS
═══════════════════════════════════════ */
.form-row { display: grid; gap: 14px; margin-bottom: 14px; }
.form-row-2 { grid-template-columns: 1fr 1fr; }
.form-row-3 { grid-template-columns: 1fr 1fr 1fr; }
.form-row-4 { grid-template-columns: 1fr 1fr 1fr 1fr; }

.form-group { display: flex; flex-direction: column; gap: 5px; }
.form-label {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: .8px;
  text-transform: uppercase;
  color: var(--text3);
}
.form-input, .form-select, .form-textarea {
  background: var(--bg3);
  border: 1.5px solid var(--line);
  border-radius: var(--radius-sm);
  padding: 8px 12px;
  font-family: var(--sans);
  font-size: 13px;
  color: var(--text);
  outline: none;
  transition: border-color var(--tr), box-shadow var(--tr);
  width: 100%;
  -webkit-appearance: none;
}
.form-input::placeholder, .form-textarea::placeholder { color: var(--text3); }
.form-input:focus, .form-select:focus, .form-textarea:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(200,98,42,.12);
}
.form-select { cursor: pointer; }
.form-textarea { resize: vertical; min-height: 80px; }

/* Range input */
.range-wrap { display: flex; align-items: center; gap: 12px; }
input[type=range] {
  flex: 1;
  -webkit-appearance: none;
  height: 3px;
  background: var(--bg4);
  border-radius: 2px;
  outline: none;
}
input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 14px; height: 14px;
  border-radius: 50%;
  background: var(--accent);
  cursor: pointer;
  border: 2px solid var(--bg);
  box-shadow: 0 0 0 1px var(--accent);
}
.range-val {
  font-family: var(--mono);
  font-size: 12px;
  color: var(--amber);
  min-width: 50px;
  text-align: right;
}

/* Checkboxes */
.check-group { display: flex; flex-wrap: wrap; gap: 8px; }
.check-item {
  display: flex;
  align-items: center;
  gap: 7px;
  padding: 6px 12px;
  background: var(--bg3);
  border: 1.5px solid var(--line);
  border-radius: 20px;
  cursor: pointer;
  transition: all var(--tr);
  user-select: none;
  font-size: 12px;
  color: var(--text2);
}
.check-item:hover { border-color: var(--line2); color: var(--text); }
.check-item.checked {
  background: rgba(200,98,42,.1);
  border-color: rgba(200,98,42,.4);
  color: var(--accent);
}
.check-item input[type=checkbox] { display: none; }

/* Language toggles */
.lang-toggle-group { display: flex; gap: 6px; }
.lang-toggle {
  padding: 5px 12px;
  background: var(--bg3);
  border: 1.5px solid var(--line);
  border-radius: 20px;
  cursor: pointer;
  font-family: var(--mono);
  font-size: 10px;
  color: var(--text3);
  transition: all var(--tr);
  user-select: none;
}
.lang-toggle:hover { color: var(--text2); border-color: var(--line2); }
.lang-toggle.on { background: rgba(42,184,122,.1); border-color: rgba(42,184,122,.3); color: var(--green); }

/* ═══════════════════════════════════════
   MAP
═══════════════════════════════════════ */
#parse-map {
  width: 100%;
  max-width: 100%;
  height: 400px;
  overflow: hidden;
  background: var(--bg3);
  display: block;
}
@media (max-width: 768px) {
  #parse-map { height: 240px; }
  .objects-sidebar-panel { position: static; }
}

.leaflet-container {
  background: #101820;
  font-family: var(--sans);
}
.leaflet-tile { filter: brightness(.8) saturate(.7) hue-rotate(200deg); }

.map-hint {
  font-size: 12px;
  color: var(--text3);
  margin-top: 8px;
  display: flex;
  align-items: center;
  gap: 6px;
}

/* ═══════════════════════════════════════
   OBJECT CARDS (parse results)
═══════════════════════════════════════ */
.objects-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 10px;
  max-height: 480px;
  overflow-y: auto;
  padding-right: 4px;
}
.objects-grid::-webkit-scrollbar { width: 4px; }
.objects-grid::-webkit-scrollbar-track { background: var(--bg3); border-radius: 2px; }
.objects-grid::-webkit-scrollbar-thumb { background: var(--bg4); border-radius: 2px; }

.obj-card {
  background: var(--bg3);
  border: 1.5px solid var(--line);
  border-radius: var(--radius-sm);
  padding: 12px 14px;
  cursor: pointer;
  transition: all var(--tr);
  user-select: none;
  display: flex;
  align-items: flex-start;
  gap: 10px;
}
.obj-card:hover { border-color: var(--line2); background: var(--bg4); }
.obj-card.selected { border-color: var(--accent); background: rgba(200,98,42,.08); }

.obj-check {
  width: 16px; height: 16px;
  border-radius: 4px;
  border: 1.5px solid var(--line2);
  flex-shrink: 0;
  margin-top: 2px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all var(--tr);
}
.obj-card.selected .obj-check {
  background: var(--accent);
  border-color: var(--accent);
}
.obj-card.selected .obj-check::after {
  content: '';
  width: 8px; height: 6px;
  border-left: 1.5px solid #fff;
  border-bottom: 1.5px solid #fff;
  transform: rotate(-45deg) translateY(-1px);
  display: block;
}

.obj-content { flex: 1; min-width: 0; }
.obj-name {
  font-size: 13px;
  font-weight: 500;
  color: var(--text);
  margin-bottom: 3px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.obj-cat {
  font-family: var(--mono);
  font-size: 9px;
  color: var(--text3);
  letter-spacing: .5px;
  text-transform: uppercase;
}
.obj-desc {
  font-size: 11px;
  color: var(--text3);
  margin-top: 4px;
  line-height: 1.5;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

/* ═══════════════════════════════════════
   GENERATING STATE ON TABLE BUTTONS
═══════════════════════════════════════ */
.btn-generating {
  pointer-events: none;
  opacity: 0.7;
  position: relative;
}
.pipe-step.generating {
  background: rgba(232,158,34,.15);
  color: var(--amber);
  animation: pulse-pipe 1s ease-in-out infinite;
}
@keyframes pulse-pipe { 0%,100%{opacity:1} 50%{opacity:0.4} }

/* ═══════════════════════════════════════
   SAVED OBJECTS TABLE (with pipeline)
═══════════════════════════════════════ */

/* Multi-delete checkbox */
.obj-check { width: 16px; height: 16px; accent-color: var(--accent); cursor: pointer; }
.obj-row-selected td { background: rgba(200,98,42,.05); }
.bulk-bar {
  display: none;
  align-items: center;
  gap: 10px;
  padding: 8px 16px;
  background: rgba(200,98,42,.08);
  border-bottom: 1px solid rgba(200,98,42,.2);
  font-size: 12px;
  color: var(--text2);
}
.bulk-bar.visible { display: flex; }

/* Audio player in modal */
.audio-item {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 12px;
  background: var(--bg3);
  border: 1px solid var(--line);
  border-radius: var(--radius-sm);
  margin-bottom: 8px;
}
.audio-item.active-audio { border-color: rgba(42,184,122,.4); background: rgba(42,184,122,.05); }
.audio-play-btn {
  width: 30px; height: 30px; border-radius: 50%;
  background: var(--bg4); border: 1px solid var(--line2);
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  color: var(--text2); flex-shrink: 0; transition: all var(--tr);
}
.audio-play-btn:hover { border-color: var(--accent); color: var(--accent); }
.audio-meta { flex: 1; min-width: 0; }
.audio-voice { font-size: 11px; color: var(--text2); font-family: var(--mono); }
.audio-active-badge { font-size: 10px; color: var(--green); margin-left: 6px; }
.card-text-area {
  width: 100%; min-height: 80px;
  background: var(--bg3); border: 1px solid var(--line);
  border-radius: var(--radius-sm); color: var(--text);
  font-size: 13px; padding: 10px 12px; resize: vertical;
  font-family: var(--sans); line-height: 1.5;
}
.card-text-area:focus { outline: none; border-color: var(--line2); }
.lang-tab { padding: 5px 12px; font-size: 12px; border-radius: 20px; cursor: pointer;
  background: var(--bg3); border: 1px solid var(--line); color: var(--text3);
  transition: all var(--tr); }
.lang-tab.active { background: rgba(200,98,42,.1); border-color: rgba(200,98,42,.4); color: var(--accent); }
.modal-wide { max-width: 680px; width: 96vw; }

.pipeline-row {
  display: flex;
  align-items: center;
  gap: 6px;
}
.pipe-step {
  display: flex;
  align-items: center;
  gap: 4px;
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: .3px;
  padding: 3px 8px;
  border-radius: 10px;
  white-space: nowrap;
}
.pipe-step.done   { background: rgba(42,184,122,.1);   color: var(--green); }
.pipe-step.active { background: rgba(232,158,34,.1);   color: var(--amber); }
.pipe-step.empty  { background: rgba(232,230,225,.05); color: var(--text3); }
.pipe-arrow { color: var(--text3); font-size: 10px; }

/* ═══════════════════════════════════════
   MODAL
═══════════════════════════════════════ */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.6);
  backdrop-filter: blur(4px);
  z-index: 500;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.modal-overlay.open { display: flex; }

.modal {
  background: var(--bg2);
  border: 1px solid var(--line2);
  border-radius: 14px;
  width: 100%;
  max-width: 520px;
  box-shadow: 0 24px 80px rgba(0,0,0,.5);
  animation: modalIn .2s cubic-bezier(.34,1.56,.64,1);
  display: flex;
  flex-direction: column;
  max-height: 90vh;
}
@keyframes modalIn { from { transform: scale(.92); opacity: 0; } }

.modal-head {
  padding: 20px 24px 16px;
  border-bottom: 1px solid var(--line);
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}
.modal-title {
  font-family: var(--serif);
  font-size: 18px;
  font-weight: 700;
  color: var(--text);
  letter-spacing: -.3px;
}
.modal-close {
  background: none;
  border: none;
  color: var(--text3);
  cursor: pointer;
  padding: 4px;
  border-radius: 6px;
  transition: all var(--tr);
  display: flex;
}
.modal-close:hover { color: var(--text); background: var(--bg3); }
.modal-body {
  padding: 20px 24px;
  overflow-y: auto;
  flex: 1;
  -webkit-overflow-scrolling: touch;
}
.modal-foot {
  padding: 16px 24px;
  border-top: 1px solid var(--line);
  display: flex;
  justify-content: flex-end;
  gap: 8px;
  flex-shrink: 0;
}

/* ═══════════════════════════════════════
   TOAST
═══════════════════════════════════════ */
.toast-wrap {
  position: fixed;
  bottom: 24px;
  right: 24px;
  z-index: 1000;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.toast {
  background: var(--bg2);
  border: 1px solid var(--line2);
  border-radius: var(--radius);
  padding: 12px 16px;
  font-size: 13px;
  color: var(--text);
  box-shadow: var(--shadow);
  display: flex;
  align-items: center;
  gap: 10px;
  min-width: 280px;
  animation: toastIn .25s ease;
  transition: opacity .3s, transform .3s;
}
@keyframes toastIn { from { transform: translateY(16px); opacity: 0; } }
.toast.hide { opacity: 0; transform: translateY(8px); }
.toast-success { border-left: 3px solid var(--green); }
.toast-error   { border-left: 3px solid var(--red); }
.toast-info    { border-left: 3px solid var(--amber); }

/* ═══════════════════════════════════════
   CITY CARD
═══════════════════════════════════════ */
.city-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 12px;
}
.city-card {
  background: var(--bg2);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  overflow: hidden;
  transition: border-color var(--tr);
}
.city-card:hover { border-color: var(--line2); }
.city-card-head {
  padding: 14px 16px;
  border-bottom: 1px solid var(--line);
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.city-card-name {
  font-family: var(--serif);
  font-size: 17px;
  font-weight: 600;
  color: var(--text);
  letter-spacing: -.3px;
}
.city-card-body { padding: 12px 16px; }
.city-card-meta {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--text3);
  margin-bottom: 8px;
  display: flex;
  flex-direction: column;
  gap: 3px;
}
.city-card-langs { display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 10px; }
.city-card-lang {
  font-family: var(--mono);
  font-size: 9px;
  padding: 2px 7px;
  border-radius: 4px;
  background: var(--bg3);
  border: 1px solid var(--line);
  color: var(--text3);
  letter-spacing: .5px;
  text-transform: uppercase;
}
.city-admins {
  display: flex;
  flex-wrap: wrap;
  gap: 5px;
}
.city-admin-chip {
  font-size: 11px;
  padding: 3px 8px;
  background: var(--bg3);
  border-radius: 10px;
  color: var(--text2);
  display: flex;
  align-items: center;
  gap: 4px;
}
.city-card-foot {
  padding: 10px 16px;
  border-top: 1px solid var(--line);
  display: flex;
  gap: 6px;
}

/* ═══════════════════════════════════════
   EMPTY STATE
═══════════════════════════════════════ */
.empty-state {
  padding: 48px 24px;
  text-align: center;
  color: var(--text3);
}
.empty-icon { font-size: 32px; margin-bottom: 12px; opacity: .4; }
.empty-title { font-family: var(--serif); font-size: 18px; font-weight: 600; color: var(--text2); margin-bottom: 6px; }
.empty-sub { font-size: 13px; line-height: 1.6; }

/* ═══════════════════════════════════════
   FILTER BAR
═══════════════════════════════════════ */
.filter-bar {
  display: flex;
  gap: 8px;
  margin-bottom: 16px;
  flex-wrap: wrap;
}
.filter-btn {
  padding: 5px 14px;
  border-radius: 20px;
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: .5px;
  cursor: pointer;
  border: 1px solid var(--line);
  background: transparent;
  color: var(--text3);
  transition: all var(--tr);
}
.filter-btn:hover { color: var(--text2); border-color: var(--line2); }
.filter-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

/* ═══════════════════════════════════════
   LOADING
═══════════════════════════════════════ */
.spinner-sm {
  width: 14px; height: 14px;
  border: 2px solid rgba(255,255,255,.2);
  border-top-color: currentColor;
  border-radius: 50%;
  animation: spin .6s linear infinite;
  display: inline-block;
}
@keyframes spin { to { transform: rotate(360deg); } }

.loading-row {
  padding: 32px;
  text-align: center;
  color: var(--text3);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  font-size: 13px;
}

/* ═══════════════════════════════════════
   ASSIGN CITIES (в модалке апрува)
═══════════════════════════════════════ */
.city-select-list {
  display: flex;
  flex-direction: column;
  gap: 6px;
  max-height: 200px;
  overflow-y: auto;
}
.city-select-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 12px;
  background: var(--bg3);
  border: 1.5px solid var(--line);
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: all var(--tr);
  user-select: none;
}
.city-select-item:hover { border-color: var(--line2); }
.city-select-item.selected { border-color: var(--green); background: rgba(42,184,122,.08); }
.city-select-name { font-size: 13px; font-weight: 500; color: var(--text); }
.city-select-country { font-size: 11px; color: var(--text3); font-family: var(--mono); }

/* ═══════════════════════════════════════
   OBJECTS SECTION LAYOUT
═══════════════════════════════════════ */
.objects-layout {
  display: flex;
  flex-direction: column;
  gap: 16px;
  width: 100%;
}
.objects-layout > div {
  width: 100%;
  min-width: 0;
}


.objects-sidebar-panel {
  position: sticky;
  top: calc(var(--topbar) + 28px);
}

/* scrollbar global */
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--bg4); border-radius: 3px; }

/* ═══════════════════════════════════════
   MOBILE BOTTOM NAV
═══════════════════════════════════════ */
.mob-nav {
  display: none;
  position: fixed;
  bottom: 0; left: 0; right: 0;
  height: 56px;
  background: var(--bg);
  border-top: 1px solid var(--line);
  z-index: 200;
  backdrop-filter: blur(10px);
}
.mob-nav-items { display: flex; height: 100%; }
.mob-nav-btn {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 3px;
  border: none;
  background: transparent;
  color: var(--text3);
  font-size: 9px;
  font-weight: 500;
  font-family: var(--sans);
  cursor: pointer;
  transition: color var(--tr);
  letter-spacing: .3px;
  text-transform: uppercase;
  position: relative;
}
.mob-nav-btn.active { color: var(--accent); }
.mob-nav-dot {
  position: absolute;
  top: 8px; right: calc(50% - 16px);
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--accent);
  display: none;
}
.mob-nav-dot.show { display: block; }

/* ═══════════════════════════════════════
   CITY MAP MODAL
═══════════════════════════════════════ */
#city-modal-map {
  width: 100%;
  height: 200px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--line);
  margin-top: 8px;
  background: var(--bg3);
}

/* ═══════════════════════════════════════
   RESPONSIVE
═══════════════════════════════════════ */
@media (max-width: 1100px) {
  .stats-row { grid-template-columns: repeat(2, 1fr); }
}

@media (max-width: 768px) {
  /* Sidebar → bottom nav */
  .sidebar { display: none; }
  .mob-nav { display: block; }

  /* Main content */
  .main { margin-left: 0; padding-bottom: 72px; }
  .section { padding: 16px; }

  /* Topbar — компактный */
  .topbar { padding: 0 12px; }
  .topbar-logo { width: auto; border-right: none; padding: 0 8px; }
  .topbar-logo svg { width: 80px; height: 28px; }
  .topbar-right { gap: 8px; }
  .topbar-name { font-size: 12px; }
  .topbar-role { display: none; }
  .topbar-avatar { width: 28px; height: 28px; font-size: 10px; }
  .btn-logout span { display: none; }
  .btn-logout { padding: 6px 8px; }
  .lang-btn { padding: 3px 7px; font-size: 9px; }

  /* Grid → single column */
  .stats-row { grid-template-columns: 1fr 1fr; }
  .form-row-2, .form-row-3, .form-row-4 { grid-template-columns: 1fr; }
  .city-grid { grid-template-columns: 1fr; }

  /* Tables scroll */
  .table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
}


.addr-dropdown {
  position: absolute; z-index: 9999;
  background: var(--bg2); border: 1px solid var(--line2);
  border-radius: var(--radius-sm); overflow: hidden;
  box-shadow: 0 8px 24px rgba(0,0,0,.4);
  max-height: 200px; overflow-y: auto;
  width: 100%;
}
.addr-option {
  padding: 9px 12px; font-size: 12px; color: var(--text2);
  cursor: pointer; border-bottom: 1px solid var(--line);
  transition: background var(--tr);
}
.addr-option:last-child { border-bottom: none; }
.addr-option:hover { background: var(--bg3); color: var(--text); }
.addr-option strong { color: var(--text); }
.addr-wrap { position: relative; }

/* ═══════════════════════════════════════
   CUSTOM CONFIRM DIALOG
═══════════════════════════════════════ */
.confirm-overlay {
  position: fixed; inset: 0; z-index: 1100;
  background: rgba(0,0,0,.6); backdrop-filter: blur(4px);
  display: none; align-items: center; justify-content: center;
}
.confirm-overlay.open { display: flex; }
.confirm-box {
  background: var(--bg2);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  padding: 28px 28px 24px;
  min-width: 320px; max-width: 420px; width: 90vw;
  box-shadow: 0 24px 60px rgba(0,0,0,.5);
}
.confirm-icon {
  width: 40px; height: 40px; border-radius: 50%;
  background: rgba(224,80,80,.1); border: 1px solid rgba(224,80,80,.2);
  display: flex; align-items: center; justify-content: center;
  margin-bottom: 14px; color: #e05050;
}
.confirm-title { font-size: 16px; font-weight: 600; color: var(--text); margin-bottom: 8px; }
.confirm-msg { font-size: 13px; color: var(--text3); line-height: 1.5; margin-bottom: 22px; }
.confirm-foot { display: flex; justify-content: flex-end; gap: 8px; }
</style>
</head>

<!-- ═══ MAIN ═══ -->
<main class="main">

  <!-- DASHBOARD -->
  <section class="section active" id="section-dashboard">

          </div>

            <div class="panel-head">
              <div class="panel-title" id="t-saved-objects-title"></div>
              <div class="btn-group">
                <button class="btn btn-danger btn-sm" id="btn-bulk-delete" onclick="bulkDeleteObjects()" style="display:none">

                </button>
              </div>
            </div>
            <div class="table-wrap">
              <table>
                <thead>
                  <tr>
                    <th style="width:32px"><input type="checkbox" class="obj-check" id="obj-check-all" onchange="toggleAllObjects(this)"></th>

                </thead>

              </table>
            </div>
          </div>
        </div>
      </div>
    </div>
  </section>

</main>

/* ═══════════════════════════════════════
   TOAST
═══════════════════════════════════════ */
function toast(msg, type = 'info') {
  const wrap = document.getElementById('toast-wrap');
  const el   = document.createElement('div');
  el.className = `toast toast-${type}`;
  const icons = {
    success: '<svg width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="7" cy="7" r="6" fill="rgba(42,184,122,.2)" stroke="#2ab87a" stroke-width="1.2"/><path d="M4.5 7l2 2 3-3" stroke="#2ab87a" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/></svg>',
    error:   '<svg width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="7" cy="7" r="6" fill="rgba(224,80,80,.2)" stroke="#e05050" stroke-width="1.2"/><path d="M7 4.5v3M7 9.5h.01" stroke="#e05050" stroke-width="1.2" stroke-linecap="round"/></svg>',
    info:    '<svg width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="7" cy="7" r="6" fill="rgba(232,158,34,.2)" stroke="#e89e22" stroke-width="1.2"/><path d="M7 6v4M7 4.5h.01" stroke="#e89e22" stroke-width="1.2" stroke-linecap="round"/></svg>',
  };
  el.innerHTML = (icons[type] || icons.info) + `<span>${msg}</span>`;
  wrap.appendChild(el);
  setTimeout(() => { el.classList.add('hide'); setTimeout(() => el.remove(), 300); }, 3500);
}

/* ═══════════════════════════════════════
   API HELPERS
═══════════════════════════════════════ */
function getToken() { return localStorage.getItem('whispr_token'); }

async function apiMain(resource, action, data = {}) {
  const res = await fetch(API_MAIN, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ token: getToken(), resource, action, data })
  });
  return res.json();
}

async function apiObjects(resource, action, data = {}) {
  const isHeavy = (resource === 'generate' || resource === 'objects' && action === 'parse');
  const timeoutMs = isHeavy ? 120000 : 30000;
  const controller = new AbortController();
  const timer = setTimeout(() => controller.abort(), timeoutMs);
  try {
    const res = await fetch(API_OBJECTS, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token: getToken(), resource, action, data }),
      signal: controller.signal
    });
    clearTimeout(timer);
    return res.json();
  } catch(e) {
    clearTimeout(timer);
    if (e.name === 'AbortError') throw new Error('Превышено время ожидания. Попробуйте снова.');
    throw e;
  }
}

async function checkAuth() {
  const token = getToken();
  if (!token) { window.location.href = 'login.html'; return false; }
  try {
    const res = await fetch(API_AUTH, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'me', token })
    });
    const d = await res.json();
    if (!d.success || d.user.role !== 'superadmin') {
      window.location.href = 'login.html'; return false;
    }
    return true;
  } catch(e) {
    window.location.href = 'login.html'; return false;
  }
}

/* ═══════════════════════════════════════
   CITY MODAL MAP
═══════════════════════════════════════ */
let cityModalMap    = null;
let cityModalMarker = null;
let citySearchTimer = null;

function initCityModalMap(lat, lng) {
  const center = (lat && lng) ? [lat, lng] : [49.5883, 34.5514];
  if (!cityModalMap) {
    setTimeout(() => {
      cityModalMap = L.map('city-modal-map', { center, zoom: 12 });
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OSM'
      }).addTo(cityModalMap);
      cityModalMap.on('click', onCityModalMapClick);
      if (lat && lng) placeCityModalMarker(lat, lng);
    }, 150);
  } else {
    cityModalMap.setView(center, 12);
    if (lat && lng) placeCityModalMarker(lat, lng);
    else if (cityModalMarker) { cityModalMarker.remove(); cityModalMarker = null; }
    setTimeout(() => cityModalMap.invalidateSize(), 200);
  }
}

function onCityModalMapClick(e) {
  placeCityModalMarker(e.latlng.lat, e.latlng.lng);
  document.getElementById('city-lat-input').value = e.latlng.lat.toFixed(6);
  document.getElementById('city-lng-input').value = e.latlng.lng.toFixed(6);
}

function placeCityModalMarker(lat, lng) {
  if (cityModalMarker) cityModalMarker.remove();
  cityModalMarker = L.marker([lat, lng], {
    icon: L.divIcon({
      className: '',
      html: `<div style="width:12px;height:12px;border-radius:50%;background:#c8622a;border:2px solid #fff;box-shadow:0 0 0 4px rgba(200,98,42,.3)"></div>`,
      iconAnchor: [6, 6]
    })
  }).addTo(cityModalMap);
}

function debounceCitySearch(val) {
  clearTimeout(citySearchTimer);
  if (val.length < 2) return;
  citySearchTimer = setTimeout(() => searchCityOnMap(val), 600);
}

async function searchCityOnMap(query) {
  const q = query || document.getElementById('city-search-input').value.trim();
  if (!q) return;
  try {
    const res = await fetch(
      `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(q)}&format=json&limit=1&addressdetails=1`,
      { headers: { 'Accept-Language': 'uk,ru,en', 'User-Agent': 'WhisprCity/1.0' } }
    );
    const data = await res.json();
    if (!data.length) { toast('Місто не знайдено', 'error'); return; }
    const place = data[0];
    const lat = parseFloat(place.lat);
    const lng = parseFloat(place.lon);
    document.getElementById('city-lat-input').value = lat.toFixed(6);
    document.getElementById('city-lng-input').value = lng.toFixed(6);
    if (!document.getElementById('city-name-input').value) {
      const name = place.address?.city || place.address?.town || place.name;
      if (name) document.getElementById('city-name-input').value = name;
    }
    if (cityModalMap) {
      cityModalMap.setView([lat, lng], 13);
      placeCityModalMarker(lat, lng);
    }
  } catch(e) { toast('Помилка пошуку', 'error'); }
}

  openModal('modal-edit-admin');
}

async function saveAdminEdit() {
  const btn = document.getElementById('t-save-edit-admin-btn');
  btn.disabled = true;
  try {
    // Сохраняем данные пользователя
    const res = await apiMain('users', 'update', {
      user_id:   editingAdmin.id,
      name:      document.getElementById('edit-admin-name').value.trim(),
      phone:     document.getElementById('edit-admin-phone').value.trim(),
      city_wish: document.getElementById('edit-admin-city-wish').value.trim(),
    });
    if (!res.success) { toast(res.error || 'Error', 'error'); btn.disabled = false; return; }

    // Diff городов
    const selectedCityIds  = [...document.querySelectorAll('#edit-admin-cities-list .city-select-item.selected')].map(el => parseInt(el.dataset.id));
    const currentCityIds   = (editingAdmin.cities || []).map(c => c.id);
    const toAdd    = selectedCityIds.filter(id => !currentCityIds.includes(id));
    const toRemove = currentCityIds.filter(id => !selectedCityIds.includes(id));
    for (const cityId of toAdd)    await apiMain('user_cities', 'assign',   { user_id: editingAdmin.id, city_ids: [cityId] });
    for (const cityId of toRemove) await apiMain('user_cities', 'unassign', { user_id: editingAdmin.id, city_id: cityId });

    toast(t('save'), 'success');
    closeModal('modal-edit-admin');
    loadRequests();
  } catch(e) { toast(e.message, 'error'); }

async function deleteAdmin(id) {

async function toggleCityActive_api(id, active) {
  try {
    const res = await apiMain('cities', 'update', { city_id: id, is_active: active });
    if (res.success) { toast(active ? t('activate') : t('deactivate'), 'success'); loadCities(); }
    else toast(res.error, 'error');
  } catch(e) { toast(e.message, 'error'); }
}

async function saveCity() {
  const name    = document.getElementById('city-name-input').value.trim();
  const country = document.getElementById('city-country-input').value.trim() || 'Ukraine';
  const lat     = parseFloat(document.getElementById('city-lat-input').value);
  const lng     = parseFloat(document.getElementById('city-lng-input').value);
  const langs   = [...document.querySelectorAll('#modal-city .lang-toggle[data-lang].on')].map(el => el.dataset.lang);
  const active  = document.getElementById('city-active-toggle').dataset.active === 'true';

  if (!name)      { toast(t('city-name-label') + ' required', 'error'); return; }
  if (!lat || !lng) { toast('Coordinates required', 'error'); return; }
  if (!langs.length) { toast('Select at least one language', 'error'); return; }

  try {
    let res;
    if (editingCityId) {
      res = await apiMain('cities', 'update', { city_id: editingCityId, name, country, center_lat: lat, center_lng: lng, languages: langs, is_active: active });
    } else {
      res = await apiMain('cities', 'create', { name, country, center_lat: lat, center_lng: lng, languages: langs, is_active: active });
    }
    if (res.success) {
      const cityId = res.city?.id || editingCityId;
      if (cityId) {
        // Выбранные сейчас
        const selectedAdmins = [...document.querySelectorAll('#city-admins-list .city-select-item.selected')]
          .map(el => parseInt(el.dataset.adminId));
        // Текущие (были когда открывали модалку)
        const currentCity   = allCitiesList.find(c => c.id === cityId);
        const currentAdmins = (currentCity?.admins || []).map(a => a.id);
        // Добавляем новых
        const toAdd    = selectedAdmins.filter(id => !currentAdmins.includes(id));
        // Убираем снятых
        const toRemove = currentAdmins.filter(id => !selectedAdmins.includes(id));
        for (const adminId of toAdd) {
          await apiMain('user_cities', 'assign', { user_id: adminId, city_ids: [cityId] });
        }
        for (const adminId of toRemove) {
          await apiMain('user_cities', 'unassign', { user_id: adminId, city_id: cityId });
        }
      }
      toast(t('save'), 'success');
      closeModal('modal-city');
      loadCities();
      loadDashboard();
    } else { toast(res.error, 'error'); }
  } catch(e) { toast(e.message, 'error'); }
}

/* ═══════════════════════════════════════
   OBJECTS SECTION
═══════════════════════════════════════ */
let parseMap     = null;
let parseMarker  = null;
let parseCircle  = null;
let parseCoords  = null;
let parseObjects = [];
let currentCity  = null;

const CATEGORIES = [
  { id: 'historic',   key: 'cat-historic' },
  { id: 'museum',     key: 'cat-museum'   },
  { id: 'church',     key: 'cat-church'   },
  { id: 'restaurant', key: 'cat-restaurant' },
  { id: 'park',       key: 'cat-park'     },
  { id: 'tourism',    key: 'cat-tourism'  },
];

function renderCategories() {
  const group = document.getElementById('categories-group');
  if (!group) return;
  group.innerHTML = CATEGORIES.map(c => `
    <div class="check-item checked" data-cat="${c.id}" onclick="this.classList.toggle('checked')">${t(c.key)}</div>
  `).join('');
}

function initObjectsSection() {
  renderCategories();
  if (!allCitiesList.length) {
    apiMain('cities', 'list').then(res => {
      allCitiesList = res.cities || [];
      populateCitySelect();
    });
  } else {
    populateCitySelect();
  }
  if (!parseMap) {
    // Инициализируем сразу без timeout чтобы Leaflet не ломал grid
    parseMap = L.map('parse-map', { center: [49.5883, 34.5514], zoom: 14 });
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '© OSM' }).addTo(parseMap);
    parseMap.on('click', onMapClick);
    // После рендера DOM — пересчитываем размер
    setTimeout(() => { parseMap.invalidateSize(); parseMap.invalidateSize(); }, 300);
  }
}

function populateCitySelect() {
  const sel = document.getElementById('obj-city-select');
  const cur = sel.value;
  sel.innerHTML = `<option value="">${t('city-select-placeholder')}</option>` +
    allCitiesList.map(c => `<option value="${c.id}" ${cur == c.id ? 'selected' : ''}>${c.name}</option>`).join('');
  // Автовибір першого міста якщо ще нічого не вибрано
  if (!cur && allCitiesList.length) {
    sel.value = allCitiesList[0].id;
    onCitySelect();
  }
}

function onCitySelect() {
  const cityId = document.getElementById('obj-city-select').value;
  if (!cityId) { document.getElementById('objects-content').style.display = 'none'; return; }
  currentCity = allCitiesList.find(c => c.id == cityId);
  document.getElementById('objects-content').style.display = 'block';
  if (parseMap && currentCity) {
    parseMap.setView([currentCity.center_lat, currentCity.center_lng], 14);
    setTimeout(() => { parseMap.invalidateSize(); parseMap.invalidateSize(); }, 300);
  }
  loadSavedObjects();
}

function onMapClick(e) {
  parseCoords = e.latlng;
  const radius = parseInt(document.getElementById('radius-slider').value);
  if (parseMarker) parseMarker.remove();
  if (parseCircle) parseCircle.remove();
  parseMarker = L.marker(e.latlng, {
    icon: L.divIcon({ className: '', html: `<div style="width:12px;height:12px;border-radius:50%;background:#c8622a;border:2px solid #fff;box-shadow:0 0 0 4px rgba(200,98,42,.25)"></div>`, iconAnchor: [6,6] })
  }).addTo(parseMap);
  parseCircle = L.circle(e.latlng, { radius, color: '#c8622a', fillColor: '#c8622a', fillOpacity: .06, weight: 1.5 }).addTo(parseMap);
  document.getElementById('coords-display').textContent = `${e.latlng.lat.toFixed(5)}, ${e.latlng.lng.toFixed(5)}`;
  document.getElementById('btn-parse').disabled = false;
}

function onRadiusChange() {
  const radius = parseInt(document.getElementById('radius-slider').value);
  document.getElementById('radius-val').textContent = radius;
  if (parseCircle && parseCoords) parseCircle.setRadius(radius);
}

function onCountChange() {
  document.getElementById('count-val').textContent = document.getElementById('count-slider').value;
}

async function startParse() {
  if (!parseCoords || !currentCity) return;
  const btn = document.getElementById('btn-parse');
  btn.disabled = true;
  btn.innerHTML = `<div class="spinner-sm"></div> ${t('loading')}`;

  const cats = [...document.querySelectorAll('#categories-group .check-item.checked')].map(el => el.dataset.cat);

  try {
    const res = await apiObjects('objects', 'parse', {
      city_name: currentCity.name,
      country:   currentCity.country,
      lat:       parseCoords.lat,
      lng:       parseCoords.lng,
      radius:    parseInt(document.getElementById('radius-slider').value),
      count:     parseInt(document.getElementById('count-slider').value),
      categories: cats
    });

    if (res.success && res.places) {
      parseObjects = res.places;
      renderParseResults(parseObjects);
    } else {
      toast(res.error || 'Parse error', 'error');
    }
  } catch(e) { toast(e.message, 'error'); }

  btn.disabled = false;
  btn.innerHTML = `<svg width="15" height="15" viewBox="0 0 15 15" fill="none"><circle cx="7.5" cy="7.5" r="6" stroke="currentColor" stroke-width="1.3"/><path d="M5 7.5h5M8 5.5l2 2-2 2" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg> ${t('parse-btn')}`;
}

function renderParseResults(places) {
  const panel = document.getElementById('parse-results-panel');
  const grid  = document.getElementById('parse-objects-grid');
  const count = document.getElementById('parse-count');
  panel.style.display = 'block';
  count.textContent   = places.length;

  grid.innerHTML = places.map((p, i) => `
    <div class="obj-card selected" data-idx="${i}" onclick="toggleObjectCard(this)">
      <div class="obj-check"></div>
      <div class="obj-content">
        <div class="obj-name">${p.name}</div>
        <div class="obj-cat">${p.category}</div>
        ${p.tags?.description ? `<div class="obj-desc">${p.tags.description}</div>` : ''}
      </div>
    </div>
  `).join('');
  updateSaveBtn();
}

function toggleObjectCard(el) { el.classList.toggle('selected'); updateSaveBtn(); }

function selectAllObjects() {
  const cards = document.querySelectorAll('.obj-card');
  const allSel = [...cards].every(c => c.classList.contains('selected'));
  cards.forEach(c => c.classList.toggle('selected', !allSel));
  updateSaveBtn();
}

function updateSaveBtn() {
  const btn = document.getElementById('btn-save-objects');
  if (btn) btn.disabled = document.querySelectorAll('.obj-card.selected').length === 0;
}

async function saveSelectedObjects() {
  const selected = [...document.querySelectorAll('.obj-card.selected')]
    .map(el => parseObjects[parseInt(el.dataset.idx)]);

  if (!selected.length || !currentCity) return;

  const btn = document.getElementById('btn-save-objects');
  btn.disabled = true;

  try {
    const res = await apiObjects('objects', 'save', {
      city_id: parseInt(document.getElementById('obj-city-select').value),
      objects: selected.map(p => ({
        name:      p.name,
        category:  p.category,
        latitude:  p.latitude,
        longitude: p.longitude,
        radius:    100,
        osm_id:    p.osm_id
      }))
    });
    if (res.success) {
      toast(`${t('save-selected')}: ${res.objects.length}`, 'success');
      document.getElementById('parse-results-panel').style.display = 'none';
      parseObjects = [];
      loadSavedObjects();
    } else { toast(res.error, 'error'); }
  } catch(e) { toast(e.message, 'error'); }
  btn.disabled = false;
}

async function loadSavedObjects() {
  const cityId = document.getElementById('obj-city-select').value;
  if (!cityId) return;
  document.getElementById('saved-objects-tbody').innerHTML =
    `<tr><td colspan="4"><div class="loading-row"><div class="spinner-sm"></div></div></td></tr>`;
  try {
    const res = await apiObjects('objects', 'list', { city_id: parseInt(cityId) });
    renderSavedObjects(res.objects || []);
  } catch(e) { toast(e.message, 'error'); }
}

let savedObjects = [];
const generatingRows = new Set(); // object_id-ов в процессе генерации

function setRowGenerating(objId, type, isOn) {
  if (isOn) generatingRows.add(objId + '-' + type);
  else generatingRows.delete(objId + '-' + type);
  // Перерисовываем строку если она в DOM
  const existing = savedObjects.find(o => o.id === objId);
  if (existing) renderSavedObjects(savedObjects);
}

function renderSavedObjects(objects) {
  savedObjects = objects;
  updateBulkBar();
  const tb = document.getElementById('saved-objects-tbody');
  if (!objects.length) {
    tb.innerHTML = `<tr><td colspan="5"><div class="empty-state">
      <div class="empty-title">${t('no-objects')}</div>
      <div class="empty-sub">${t('no-objects-sub')}</div>
    </div></td></tr>`;
    return;
  }
  tb.innerHTML = objects.map(o => {
    const hasText  = o.cards && o.cards.some(c => c.status === 'generated' || c.status === 'ready' || c.text_status === 'generated' || c.text_status === 'ready');
    const hasAudio = o.audio_count > 0 || (o.cards && o.cards.some(c => c.has_audio || c.audio_count > 0));

    return `<tr data-obj-id="${o.id}">
      <td style="width:32px"><input type="checkbox" class="obj-check obj-row-check" data-id="${o.id}" onchange="onObjCheckChange()"></td>
      <td class="td-name">${o.name}</td>
      <td><span class="pill pill-draft">${o.category}</span></td>
      <td><div class="pipeline-row">
        <span class="pipe-step done">saved</span>
        <span class="pipe-arrow">›</span>
        <span class="pipe-step ${hasText?'done':'empty'}">${t('gen-text')}</span>
        <span class="pipe-arrow">›</span>
        <span class="pipe-step ${hasAudio?'done':'empty'}">${t('gen-audio')}</span>
      </div></td>
      <td><div class="btn-group">
        <button class="btn btn-ghost btn-sm" onclick='openEditObjModal(${JSON.stringify(o).replace(/'/g,"&#39;")})'><svg width="11" height="11" viewBox="0 0 11 11" fill="none"><path d="M1.5 9.5h2l5-5-2-2-5 5v2z" stroke="currentColor" stroke-width="1.1" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
        <button class="btn btn-amber btn-sm" onclick='openGenTextModal(${JSON.stringify(o).replace(/'/g,"&#39;")})'>${t('gen-text')}</button>
        <button class="btn btn-ghost btn-sm" onclick='openGenAudioModal(${JSON.stringify(o).replace(/'/g,"&#39;")})'>${t('gen-audio')}</button>
      </div></td>
    </tr>`;
  }).join('');
}

function onObjCheckChange() {
  updateBulkBar();
  const checks = document.querySelectorAll('.obj-row-check');
  const allChecked = [...checks].every(c => c.checked);
  const checkAll = document.getElementById('obj-check-all');
  if (checkAll) checkAll.checked = allChecked && checks.length > 0;
}

function toggleAllObjects(master) {
  document.querySelectorAll('.obj-row-check').forEach(c => c.checked = master.checked);
  updateBulkBar();
}

function updateBulkBar() {
  const selected = document.querySelectorAll('.obj-row-check:checked');
  const btn = document.getElementById('btn-bulk-delete');
  if (!btn) return;
  if (selected.length > 0) {
    btn.style.display = '';
    const lbl = document.getElementById('t-bulk-delete-btn');
    if (lbl) lbl.textContent = t('bulk-delete-btn') + ' (' + selected.length + ')';
  } else {
    btn.style.display = 'none';
  }
}

async function bulkDeleteObjects() {
  const ids = [...document.querySelectorAll('.obj-row-check:checked')].map(c => parseInt(c.dataset.id));
  if (!ids.length) return;
  if (!await customConfirm(`Удалить ${ids.length} объект(ов)?`, 'Удалить')) return;
  try {
    await Promise.all(ids.map(id => apiObjects('objects', 'delete', { object_id: id })));
    toast(`Удалено ${ids.length} объектов`, 'success');
    const checkAll = document.getElementById('obj-check-all');
    if (checkAll) checkAll.checked = false;
    loadSavedObjects();
  } catch(e) { toast(e.message, 'error'); }
}

═══════════════════════════════════════ */
let genTextObject = null;

function openGenTextModal(obj) {
  genTextObject = typeof obj === 'string' ? JSON.parse(obj) : obj;
  document.getElementById('gen-text-obj-name').textContent = genTextObject.name;
  openModal('modal-gen-text');
}

async function confirmGenText() {
  const langs = [...document.querySelectorAll('#modal-gen-text .lang-toggle.on')].map(el => el.dataset.lang);
  if (!langs.length) { toast('Выберите хотя бы один язык', 'error'); return; }
  closeModal('modal-gen-text');
  setRowGenerating(genTextObject.id, 'text', true);
  try {
    const res = await apiObjects('generate', 'text', { object_id: genTextObject.id, languages: langs });
    if (res.success) {
      toast(`Тексты готовы: ${genTextObject.name}`, 'success');
      loadSavedObjects();
    } else { toast(res.error || 'Ошибка генерации текста', 'error'); }
  } catch(e) { toast(e.message, 'error'); }
  setRowGenerating(genTextObject.id, 'text', false);
}

/* ═══════════════════════════════════════
   GEN AUDIO MODAL
═══════════════════════════════════════ */
let genAudioObject = null;

function openGenAudioModal(obj) {
  genAudioObject = typeof obj === 'string' ? JSON.parse(obj) : obj;
  document.getElementById('gen-audio-obj-name').textContent = genAudioObject.name;
  openModal('modal-gen-audio');
}

async function confirmGenAudio() {
  const voice = document.getElementById('voice-select').value;
  const langs = [...document.querySelectorAll('#audio-lang-toggles .lang-toggle.on')].map(el => el.dataset.lang);
  if (!langs.length) { toast('Выберите хотя бы один язык', 'error'); return; }

  closeModal('modal-gen-audio');
  setRowGenerating(genAudioObject.id, 'audio', true);

  try {
    const cardsRes = await apiObjects('cards', 'list', { object_id: genAudioObject.id });
    const cards = cardsRes.cards || [];

    let ok = 0, fail = 0;
    for (let i = 0; i < langs.length; i++) {
      const lang = langs[i];
      const card = cards.find(c => c.lang_code === lang);
      if (!card) { toast(`Нет текста для ${lang.toUpperCase()} — пропущено`, 'error'); fail++; continue; }
      try {
        const res = await apiObjects('generate', 'audio', { card_id: card.id, voice });
        if (res.success) ok++; else { toast(`Ошибка ${lang.toUpperCase()}: ${res.error||''}`, 'error'); fail++; }
      } catch(e) { toast(`${lang.toUpperCase()}: ${e.message}`, 'error'); fail++; }
    }

    if (ok > 0) {
      toast(`Аудио готово: ${ok} язык(ов)${fail ? ', ошибок: '+fail : ''}`, 'success');
      loadSavedObjects();
    } else {
      toast('Генерация не удалась. Убедитесь что тексты сгенерированы.', 'error');
    }
  } catch(e) { toast(e.message, 'error'); }

  setRowGenerating(genAudioObject.id, 'audio', false);
}





/* ═══════════════════════════════════════
   CUSTOM CONFIRM
═══════════════════════════════════════ */
let _confirmResolve = null;

function customConfirm(msg, okLabel = 'Удалить', title = 'Подтвердите действие') {
  document.getElementById('confirm-title').textContent = title;
  document.getElementById('confirm-msg').textContent   = msg;
  document.getElementById('confirm-ok-btn').textContent = okLabel;
  document.getElementById('confirm-overlay').classList.add('open');
  return new Promise(resolve => { _confirmResolve = resolve; });
}

function confirmResolve(val) {
  document.getElementById('confirm-overlay').classList.remove('open');
  if (_confirmResolve) { _confirmResolve(val); _confirmResolve = null; }
}


/* ═══════════════════════════════════════
   ADD OBJECT MODAL
═══════════════════════════════════════ */
let addObjMap      = null;
let addObjMarker   = null;
let addObjAddrTimer = null;

function openAddObjectModal() {
  if (!currentCity) { toast('Сначала выберите город', 'error'); return; }
  document.getElementById('add-obj-name').value = '';
  document.getElementById('add-obj-addr').value = '';
  document.getElementById('add-obj-lat').value  = '';
  document.getElementById('add-obj-lng').value  = '';
  document.getElementById('add-obj-addr-dropdown').style.display = 'none';
  openModal('modal-add-obj');
  setTimeout(() => initAddObjMap(), 200);
}

function initAddObjMap() {
  const center = [currentCity.center_lat, currentCity.center_lng];
  if (!addObjMap) {
    addObjMap = L.map('add-obj-map', { center, zoom: 14 });
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '© OSM' }).addTo(addObjMap);
    addObjMap.on('click', onAddObjMapClick);
  } else {
    addObjMap.setView(center, 14);
    if (addObjMarker) { addObjMarker.remove(); addObjMarker = null; }
  }
  setTimeout(() => addObjMap.invalidateSize(), 100);
}

function onAddObjMapClick(e) {
  placeAddObjMarker(e.latlng.lat, e.latlng.lng);
  document.getElementById('add-obj-lat').value = e.latlng.lat.toFixed(6);
  document.getElementById('add-obj-lng').value = e.latlng.lng.toFixed(6);
  // Reverse geocode для адреса
  fetch(`https://nominatim.openstreetmap.org/reverse?lat=${e.latlng.lat}&lon=${e.latlng.lng}&format=json`,
    { headers: { 'Accept-Language': 'uk,ru', 'User-Agent': 'WhisprCity/1.0' } })
    .then(r => r.json())
    .then(d => {
      if (d.display_name) document.getElementById('add-obj-addr').value = d.display_name.split(',').slice(0,3).join(', ');
    }).catch(() => {});
}

function placeAddObjMarker(lat, lng) {
  if (addObjMarker) addObjMarker.remove();
  addObjMarker = L.marker([lat, lng], {
    icon: L.divIcon({
      className: '',
      html: `<div style="width:14px;height:14px;border-radius:50%;background:#c8622a;border:2px solid #fff;box-shadow:0 0 0 4px rgba(200,98,42,.3)"></div>`,
      iconAnchor: [7, 7]
    })
  }).addTo(addObjMap);
}

function onAddObjAddrInput(val) {
  clearTimeout(addObjAddrTimer);
  const dd = document.getElementById('add-obj-addr-dropdown');
  if (val.length < 3) { dd.style.display = 'none'; return; }
  addObjAddrTimer = setTimeout(() => searchAddObjAddr(val), 500);
}

async function searchAddObjAddr(q) {
  const dd = document.getElementById('add-obj-addr-dropdown');
  try {
    const city = currentCity ? `, ${currentCity.name}` : '';
    const res = await fetch(
      `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(q + city)}&format=json&limit=5&addressdetails=1`,
      { headers: { 'Accept-Language': 'uk,ru,en', 'User-Agent': 'WhisprCity/1.0' } }
    );
    const data = await res.json();
    if (!data.length) { dd.style.display = 'none'; return; }
    dd.innerHTML = data.map(p => {
      const short = p.display_name.split(',').slice(0,3).join(', ');
      return `<div class="addr-option" onclick="selectAddObjAddr(${p.lat}, ${p.lon}, '${short.replace(/'/g,"\'")}')">
        <strong>${short}</strong>
      </div>`;
    }).join('');
    dd.style.display = 'block';
  } catch(e) { dd.style.display = 'none'; }
}

function selectAddObjAddr(lat, lng, label) {
  lat = parseFloat(lat); lng = parseFloat(lng);
  document.getElementById('add-obj-addr').value = label;
  document.getElementById('add-obj-lat').value  = lat.toFixed(6);
  document.getElementById('add-obj-lng').value  = lng.toFixed(6);
  document.getElementById('add-obj-addr-dropdown').style.display = 'none';
  if (addObjMap) { addObjMap.setView([lat, lng], 17); placeAddObjMarker(lat, lng); }
  // Автозаполнение названия если пустое
  if (!document.getElementById('add-obj-name').value) {
    document.getElementById('add-obj-name').value = label.split(',')[0].trim();
  }
}

async function saveNewObject() {
  const name     = document.getElementById('add-obj-name').value.trim();
  const category = document.getElementById('add-obj-category').value;
  const lat      = parseFloat(document.getElementById('add-obj-lat').value);
  const lng      = parseFloat(document.getElementById('add-obj-lng').value);

  if (!name)       { toast('Введите название', 'error'); return; }
  if (!lat || !lng){ toast('Укажите координаты на карте или через поиск', 'error'); return; }

  const btn = document.querySelector('#modal-add-obj .btn-primary');
  const origHTML = btn.innerHTML;
  btn.disabled = true;
  btn.innerHTML = '<div class="spinner-sm"></div>';

  try {
    const res = await apiObjects('objects', 'save', {
      city_id: currentCity.id,
      objects: [{ name, category, latitude: lat, longitude: lng, radius: 50, osm_id: 'manual_' + Date.now() }]
    });
    if (res.success) {
      toast(`Объект добавлен: ${name}`, 'success');
      closeModal('modal-add-obj');
      loadSavedObjects();
    } else { toast(res.error || 'Ошибка сохранения', 'error'); }
  } catch(e) { toast(e.message, 'error'); }

  btn.disabled = false;
  btn.innerHTML = origHTML;
}

// Закрывать dropdown при клике вне
document.addEventListener('click', e => {
  if (!e.target.closest('.addr-wrap')) {
    const dd = document.getElementById('add-obj-addr-dropdown');
    if (dd) dd.style.display = 'none';
  }
});

/* ═══════════════════════════════════════
   EDIT OBJECT MODAL
═══════════════════════════════════════ */
let editingObj    = null;
let editObjCards  = [];
let editTextLang  = 'uk';
let editAudioLang = 'uk';
let currentAudio  = null;

async function openEditObjModal(obj) {
  editingObj = typeof obj === 'string' ? JSON.parse(obj) : obj;
  document.getElementById('edit-obj-name').value = editingObj.name || '';
  document.getElementById('edit-obj-audio-list').innerHTML = '<div class="loading-row"><div class="spinner-sm"></div></div>';

  // Load cards
  try {
    const res = await apiObjects('cards', 'list', { object_id: editingObj.id });
    editObjCards = res.cards || [];
  } catch(e) { editObjCards = []; }

  const langs = editObjCards.length
    ? [...new Set(editObjCards.map(c => c.lang_code))]
    : ['uk', 'ru', 'en'];
  editTextLang  = langs[0] || 'uk';
  editAudioLang = langs[0] || 'uk';

  renderEditObjLangTabs(langs);
  renderEditObjAudioLangTabs(langs);
  switchEditObjLang(editTextLang);
  openModal('modal-edit-obj');
  await loadEditObjAudio();
}

function renderEditObjLangTabs(langs) {
  const el = document.getElementById('edit-obj-lang-tabs');
  el.innerHTML = langs.map(l => `
    <button class="lang-tab ${l === editTextLang ? 'active' : ''}" onclick="switchEditObjLang('${l}')">${l.toUpperCase()}</button>
  `).join('');
}

function renderEditObjAudioLangTabs(langs) {
  const el = document.getElementById('edit-obj-audio-lang-tabs');
  el.innerHTML = langs.map(l => `
    <button class="lang-tab ${l === editAudioLang ? 'active' : ''}" onclick="switchEditObjAudioLang('${l}')">${l.toUpperCase()}</button>
  `).join('');
}

function switchEditObjLang(lang) {
  editTextLang = lang;
  document.querySelectorAll('#edit-obj-lang-tabs .lang-tab').forEach(b =>
    b.classList.toggle('active', b.textContent.trim().toLowerCase() === lang));
  const card = editObjCards.find(c => c.lang_code === lang);
  document.getElementById('edit-obj-text').value = card ? (card.text || '') : '';
}

function switchEditObjAudioLang(lang) {
  editAudioLang = lang;
  document.querySelectorAll('#edit-obj-audio-lang-tabs .lang-tab').forEach(b =>
    b.classList.toggle('active', b.textContent.trim().toLowerCase() === lang));
  loadEditObjAudio();
}

async function loadEditObjAudio() {
  const card = editObjCards.find(c => c.lang_code === editAudioLang);
  const list = document.getElementById('edit-obj-audio-list');
  if (!card) { list.innerHTML = '<div style="font-size:12px;color:var(--text3)">Нет текста для этого языка</div>'; return; }
  list.innerHTML = '<div class="loading-row"><div class="spinner-sm"></div></div>';
  try {
    const res = await apiObjects('audio', 'list', { card_id: card.id });
    const audios = res.audio_files || res.audio || [];
    if (!audios.length) {
      list.innerHTML = '<div style="font-size:12px;color:var(--text3)">Нет аудиофайлов</div>';
      return;
    }
    list.innerHTML = audios.map(a => `
      <div class="audio-item ${a.is_active ? 'active-audio' : ''}" data-audio-id="${a.id}">
        <button class="audio-play-btn" onclick="playAudio('${a.url}', this)" title="Слушать">
          <svg width="10" height="12" viewBox="0 0 10 12" fill="currentColor"><path d="M0 0l10 6-10 6z"/></svg>
        </button>
        <div class="audio-meta">
          <div class="audio-voice">${a.voice || 'manual'}${a.duration_sec ? ' · ' + a.duration_sec + 's' : ''}
            ${a.is_active ? '<span class="audio-active-badge">● active</span>' : ''}
          </div>
          <div style="font-size:10px;color:var(--text3);margin-top:2px;font-family:var(--mono)">${a.url ? a.url.split('/').pop().substring(0,40) : ''}</div>
        </div>
        <div class="btn-group">
          ${!a.is_active ? `<button class="btn btn-success btn-sm" onclick="setAudioActive(${a.id}, ${card.id})" title="Сделать активным">✓</button>` : ''}
          <button class="btn btn-danger btn-sm" onclick="deleteAudio(${a.id}, ${card.id})" title="Удалить">✕</button>
        </div>
      </div>
    `).join('');
  } catch(e) {
    list.innerHTML = '<div style="font-size:12px;color:var(--text3)">Ошибка загрузки</div>';
  }
}

const PLAY_ICON  = '<svg width="10" height="12" viewBox="0 0 10 12" fill="currentColor"><path d="M0 0l10 6-10 6z"/></svg>';
const PAUSE_ICON = '<svg width="10" height="10" viewBox="0 0 10 10" fill="currentColor"><rect x="0" y="0" width="4" height="10"/><rect x="6" y="0" width="4" height="10"/></svg>';
let currentAudioBtn = null;

function resetAudioBtn() {
  if (currentAudioBtn) { currentAudioBtn.innerHTML = PLAY_ICON; currentAudioBtn = null; }
}

function playAudio(url, btn) {
  // Если нажали ту же кнопку — пауза/возобновление
  if (currentAudio && currentAudioBtn === btn) {
    if (currentAudio.paused) {
      currentAudio.play();
      btn.innerHTML = PAUSE_ICON;
    } else {
      currentAudio.pause();
      btn.innerHTML = PLAY_ICON;
    }
    return;
  }
  // Останавливаем предыдущий
  if (currentAudio) { currentAudio.pause(); resetAudioBtn(); currentAudio = null; }
  if (!url) return;
  currentAudio = new Audio(url);
  currentAudioBtn = btn;
  currentAudio.play();
  btn.innerHTML = PAUSE_ICON;
  currentAudio.onended = () => { resetAudioBtn(); currentAudio = null; };
}

async function saveCardText() {
  const card = editObjCards.find(c => c.lang_code === editTextLang);
  if (!card) { toast('Нет карточки для этого языка', 'error'); return; }
  const text = document.getElementById('edit-obj-text').value.trim();
  try {
    const res = await apiObjects('cards', 'update', {
      object_id: editingObj.id, lang_code: editTextLang, text, text_status: 'ready'
    });
    if (res.success) {
      card.text = text; card.text_status = 'ready';
      toast('Текст сохранён', 'success');
    } else { toast(res.error, 'error'); }
  } catch(e) { toast(e.message, 'error'); }
}

async function saveEditObj() {
  const name = document.getElementById('edit-obj-name').value.trim();
  if (!name) { toast('Введите название', 'error'); return; }
  try {
    const res = await apiObjects('objects', 'update', { object_id: editingObj.id, name });
    if (res.success) {
      toast('Объект сохранён', 'success');
      closeModal('modal-edit-obj');
      loadSavedObjects();
    } else { toast(res.error, 'error'); }
  } catch(e) { toast(e.message, 'error'); }
}

async function setAudioActive(audioId, cardId) {
  try {
    await apiObjects('audio', 'set_active', { audio_id: audioId });
    toast('Активный аудиофайл изменён', 'success');
    loadEditObjAudio();
  } catch(e) { toast(e.message, 'error'); }
}

async function deleteAudio(audioId, cardId) {
  if (!await customConfirm('Удалить аудиофайл?', 'Удалить')) return;
  try {
    await apiObjects('audio', 'delete', { audio_id: audioId });
    toast('Аудио удалено', 'success');
    loadEditObjAudio();
  } catch(e) { toast(e.message, 'error'); }
}

async function uploadAudioManually() {
  const fileInput = document.getElementById('edit-obj-audio-file');
  const voice     = document.getElementById('edit-obj-upload-voice').value;
  const card      = editObjCards.find(c => c.lang_code === editAudioLang);

  if (!fileInput.files[0]) { toast('Выберите файл', 'error'); return; }
  if (!card) { toast('Нет карточки для этого языка', 'error'); return; }

  const file = fileInput.files[0];
  const formData = new FormData();
  formData.append('file', file);
  formData.append('upload_preset', 'ml_default');
  formData.append('folder', 'whispr_audio');
  formData.append('resource_type', 'video');

  try {
    const uploadRes = await fetch('https://api.cloudinary.com/v1_1/dzxvshxvk/video/upload', {
      method: 'POST', body: formData
    });
    const uploadData = await uploadRes.json();
    if (!uploadData.secure_url) throw new Error('Cloudinary upload failed');

    const saveRes = await apiObjects('audio', 'save', {
      card_id: card.id,
      url: uploadData.secure_url,
      voice,
      duration_sec: Math.round(uploadData.duration || 0)
    });
    if (saveRes.success || saveRes.audio) {
      toast('Аудио загружено', 'success');
      fileInput.value = '';
      loadEditObjAudio();
    } else { toast(saveRes.error || 'Save error', 'error'); }
  } catch(e) { toast(e.message, 'error'); }
}

/* ═══════════════════════════════════════
   INIT
═══════════════════════════════════════ */
(async function init() {
  const savedLang = localStorage.getItem('whispr_lang');
  if (savedLang && i18n[savedLang]) {
    lang = savedLang;
    document.querySelectorAll('.lang-btn').forEach(b => {
      b.classList.toggle('active', b.textContent.trim().toLowerCase() === (savedLang === 'uk' ? 'ua' : savedLang));
    });
  }

  const user = JSON.parse(localStorage.getItem('whispr_user') || '{}');
  if (user.name) {
    document.getElementById('tb-name').textContent = user.name;
    document.getElementById('tb-role').textContent = user.role || 'superadmin';
    document.getElementById('tb-avatar').textContent = user.name.substring(0, 2).toUpperCase();
  }

  renderLang();

  const ok = await checkAuth();
  if (!ok) return;

  loadDashboard();
})();
</script>
